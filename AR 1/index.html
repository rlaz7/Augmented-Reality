<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Uji Coba AR - Perbaikan</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* PERBAIKAN: Memaksa halaman dan canvas kamera pas dengan rasio HP */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* Menghilangkan border aneh pada canvas AR */
        .a-canvas {
            width: 100% !important;
            height: 100% !important;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
             embedded 
             vr-mode-ui="enabled: false"
             renderer="colorManagement: true">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-ar" mindar-image-target="targetIndex: 0">
            <a-gltf-model src="./model.glb" position="0 0 0" scale="0.05 0.05 0.05"></a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        const targetEl = document.querySelector('#target-ar');
        
        // Logika jika kamera BERHASIL mengenali gambar target
        targetEl.addEventListener("targetFound", event => {
            console.log("Gambar terdeteksi!");
            alert("Gambar BERHASIL discan! Jika objek 3D belum muncul, berarti masalah ada pada ukuran (scale) atau koordinat posisi model.glb kamu.");
        });

        // Logika jika gambar hilang dari pandangan kamera
        targetEl.addEventListener("targetLost", event => {
            console.log("Gambar kehilangan fokus.");
        });
    </script>
</body>
</html>
